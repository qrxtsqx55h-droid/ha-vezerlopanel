# =============================================================================
# dashboard_43/home.yaml
# -----------------------------------------------------------------------------
# KEZDOOLDAL (page_home) - alapertelmezett oldal a tab bar 0. indexen
# -----------------------------------------------------------------------------
# Tartalom:
#   - Bal panel:  Rendszerido (nagy ora), benti hom/para, datum, napkelte/menete
#   - Jobb felso: Idojaras kartya (ikon + hom + paratart + szel + nyomas)
#                 -> Kattintva: forecast overlay (5 napos elorejelzes)
#   - Jobb also:  Home Assistant kapcsolat allapot (ONLINE/OFFLINE + WiFi)
#   - Settings gomb (jobb also sarok, fogaskerek ikon)
#
# Szenzorok HA-bol:
#   - HA weather attributes: temp, humidity, wind_speed, pressure, state
#   - HA indoor: temperature, humidity
#
# UI frissites: minden HA sensor "on_value" frissiti a megfelelo cimket
# (es a forecast overlay tukrozett cimkeit is - ui_fc_*).
# =============================================================================

# -----------------------------------------------------------------------------
# IDOJARAS + BELTERI SZENZOROK
# -----------------------------------------------------------------------------
# Az isnan check kell mert a weather attributumok valamilyen helyzetben
# (pl. API hiba) NaN-t adhatnak vissza - egyebkent "nan" felirat jelenne meg.
sensor:
  - platform: homeassistant
    id: weather_temp
    entity_id: "${entity_weather}"
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update: { id: ui_temp_label, text: !lambda 'return isnan(x) ? "--" : str_sprintf("%.0f", x);' }
        - lvgl.label.update: { id: ui_fc_current_temp, text: !lambda 'return isnan(x) ? "--°" : str_sprintf("%.0f°", x);' }
  - platform: homeassistant
    id: weather_humidity
    entity_id: "${entity_weather}"
    attribute: humidity
    on_value:
      then:
        - lvgl.label.update: { id: ui_humidity_label, text: !lambda 'return isnan(x) ? "--%" : str_sprintf("%.0f%%", x);' }
        - lvgl.label.update: { id: ui_fc_current_hum, text: !lambda 'return isnan(x) ? "--%" : str_sprintf("%.0f%%", x);' }
  - platform: homeassistant
    id: weather_wind
    entity_id: "${entity_weather}"
    attribute: wind_speed
    on_value:
      then:
        - lvgl.label.update: { id: ui_wind_label, text: !lambda 'return isnan(x) ? "--" : str_sprintf("%.0f", x);' }
        - lvgl.label.update: { id: ui_fc_current_wind, text: !lambda 'return isnan(x) ? "--" : str_sprintf("%.0f", x);' }
  - platform: homeassistant
    id: weather_pressure
    entity_id: "${entity_weather}"
    attribute: pressure
    on_value:
      then:
        - lvgl.label.update: { id: ui_pressure_label, text: !lambda 'return isnan(x) ? "----" : str_sprintf("%.0f", x);' }
        - lvgl.label.update: { id: ui_fc_current_press, text: !lambda 'return isnan(x) ? "----" : str_sprintf("%.0f", x);' }
  - platform: homeassistant
    id: indoor_temp
    entity_id: "${entity_indoor_temp}"
    on_value:
      then:
        - lvgl.label.update: { id: ui_indoor_temp, text: !lambda 'return str_sprintf("%.1f°C", x);' }
        - lvgl.label.update: { id: ui_current_temp_lbl, text: !lambda 'return str_sprintf("%.1f °C", x);' }
        - lvgl.label.update: { id: ui_night_amber_temp,  text: !lambda 'return str_sprintf("%.1f°C", x);' }
        - lvgl.label.update: { id: ui_night_matrix_temp, text: !lambda 'return str_sprintf("%.1f°C", x);' }
  - platform: homeassistant
    id: indoor_hum
    entity_id: "${entity_indoor_hum}"
    on_value:
      then:
        - lvgl.label.update: { id: ui_indoor_hum, text: !lambda 'return str_sprintf("%.0f%%", x);' }
        - lvgl.label.update: { id: ui_night_amber_hum,  text: !lambda 'return str_sprintf("%.0f%%", x);' }
        - lvgl.label.update: { id: ui_night_matrix_hum, text: !lambda 'return str_sprintf("%.0f%%", x);' }

# -----------------------------------------------------------------------------
# IDOJARAS ALLAPOT - magyar fordias + nagy idojaras ikon valtas
# -----------------------------------------------------------------------------
# A weather.state egy enum stringet ad ("sunny", "cloudy", "partlycloudy", stb.).
# Egy lambda mind a ket cimket (home + forecast) frissiti egyetlen szovegre,
# majd az if-blokkok a megfelelo PNG ikont allitjak be (ui_weather_icon_big
# + ui_fc_current_icon - egyszerre).
text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: "${entity_weather}"
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            std::string hu;
            if (s == "sunny") hu = "Napos";
            else if (s == "cloudy") hu = "Felhos";
            else if (s == "partlycloudy") hu = "Reszben felhos";
            else if (s == "rainy") hu = "Esos";
            else if (s == "pouring") hu = "Zaporeso";
            else if (s == "snowy") hu = "Havas";
            else if (s == "snowy-rainy") hu = "Havas eso";
            else if (s == "windy" || s == "windy-variant") hu = "Szeles";
            else if (s == "clear-night") hu = "Tiszta ej";
            else if (s == "fog") hu = "Kodos";
            else if (s == "hail") hu = "Jegeso";
            else if (s == "lightning" || s == "lightning-rainy") hu = "Vihar";
            else if (s == "exceptional") hu = "Extrem ido";
            else hu = s;
            lv_label_set_text(id(ui_weather_state_label), hu.c_str());
            lv_label_set_text(id(ui_fc_current_state), hu.c_str());
        - if: { condition: { lambda: 'return x == "sunny";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_sunny }, lvgl.image.update: { id: ui_fc_current_icon, src: img_sunny }] }
        - if: { condition: { lambda: 'return x == "cloudy";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_cloudy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_cloudy }] }
        - if: { condition: { lambda: 'return x == "partlycloudy";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_partlycloudy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_partlycloudy }] }
        - if: { condition: { lambda: 'return x == "rainy";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_rainy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_rainy }] }
        - if: { condition: { lambda: 'return x == "pouring";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_pouring }, lvgl.image.update: { id: ui_fc_current_icon, src: img_pouring }] }
        - if: { condition: { lambda: 'return x == "snowy" || x == "snowy-rainy" || x == "hail";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_snowy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_snowy }] }
        - if: { condition: { lambda: 'return x == "windy" || x == "windy-variant";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_windy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_windy }] }
        - if: { condition: { lambda: 'return x == "clear-night";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_night }, lvgl.image.update: { id: ui_fc_current_icon, src: img_night }] }
        - if: { condition: { lambda: 'return x == "lightning" || x == "lightning-rainy";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_thunderstorm }, lvgl.image.update: { id: ui_fc_current_icon, src: img_thunderstorm }] }
        - if: { condition: { lambda: 'return x == "fog";' }, then: [lvgl.image.update: { id: ui_weather_icon_big, src: img_cloudy }, lvgl.image.update: { id: ui_fc_current_icon, src: img_cloudy }] }

