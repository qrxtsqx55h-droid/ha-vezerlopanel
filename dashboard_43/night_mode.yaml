                  id(is_night_active) = false;
              # Ebresztes: hattervilagitas vissza BE (a sotet kepernyo felebred)
              - switch.turn_on: lcd_backlight
              - if:
                  condition: { lambda: 'return id(night_mode_manual).state;' }
                  then: [ switch.turn_off: night_mode_manual ]
              - script.execute: { id: set_tab_active, tab_index: 0 }
              - lvgl.widget.show: main_tab_bar
    - id: page_night_matrix
