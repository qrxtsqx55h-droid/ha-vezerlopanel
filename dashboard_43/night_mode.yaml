            id: ui_night_sec_arc
            align: CENTER
            width: 360
            height: 360
            start_angle: 0
            end_angle: 360
            rotation: 270
            min_value: 0
            max_value: 60
            arc_color: 0x110800
            arc_width: 2
            indicator: { arc_color: 0x332200, arc_width: 2 }
        - arc:
            id: ui_night_min_arc
            align: CENTER
            width: 330
            height: 330
