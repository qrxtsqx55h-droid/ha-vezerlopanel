        - label: { id: ui_night_amber_temp, x: 320, y: 412, text: "--°C", text_font: font_mono_md, text_color: 0x664400 }
        - label: { x: 410, y: 415, text: "PARA", text_font: font_xs, text_color: 0x553300, text_letter_space: 2 }
