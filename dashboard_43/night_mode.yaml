        - label: { x: 280, y: 415, text: "BENTI", text_font: font_mono_sm, text_color: 0x004822, text_letter_space: 2 }
        - label: { id: ui_night_matrix_temp, x: 320, y: 413, text: "--°C", text_font: font_mono_md, text_color: 0x006B30 }
        - label: { x: 410, y: 415, text: "PARA", text_font: font_mono_sm, text_color: 0x004822, text_letter_space: 2 }
        - label: { id: ui_night_matrix_hum,  x: 445, y: 413, text: "--%",  text_font: font_mono_md, text_color: 0x006B30 }
        - label: { align: BOTTOM_MID, y: -10, text: "- WAKE UP NEO - ERINTSD MEG -", text_font: font_mono_sm, text_color: 0x003318, text_letter_space: 3 }
        - button:
            x: 0
            y: 0
            width: 800
            height: 480
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - lambda: |-
                  id(night_snooze) = true;
                  id(is_night_active) = false;
              # Ebresztes: hattervilagitas vissza BE (a sotet kepernyo felebred)
              - switch.turn_on: lcd_backlight
              - if:
                  condition: { lambda: 'return id(night_mode_manual).state;' }
                  then: [ switch.turn_off: night_mode_manual ]
              - script.execute: { id: set_tab_active, tab_index: 0 }
              - lvgl.widget.show: main_tab_bar