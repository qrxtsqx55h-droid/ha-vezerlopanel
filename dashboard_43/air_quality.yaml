              - label: { x: 68, y: 44, text: "PM2.5 - ug/m3", text_font: font_xs, text_color: $color_subtle }
              - bar: { id: ui_pm25_bar, x: 68, y: 70, width: 165, height: 4, value: 30, indicator: { bg_color: $color_accent_green }, bg_color: 0x1E2235, radius: 2 }
              - label: { id: ui_pm25_val, x: 246, y: 50, text: "--", text_font: font_mono_lg, text_color: 0x00CC66 }
              - obj: { x: 14, y: 96, width: 44, height: 44, bg_color: 0x102A1F, radius: 8, pad_all: 0, widgets: [ label: { align: CENTER, text: "\U000F015F", text_font: icons_md, text_color: $color_accent_green } ] }
              - label: { x: 68, y: 100, text: "PM10 - ug/m3", text_font: font_xs, text_color: $color_subtle }
