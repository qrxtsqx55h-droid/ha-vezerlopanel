# =============================================================================
# FONTOK
# =============================================================================
# Ket csalad: Roboto (proporcionalis - feliratok) + Roboto Mono (monospace -
# szamok, idoertekek). A `glyphs:` szuri a betoltodo karaktereket - csak a
# tenyleges hasznalatakat (a magyar ekezetes betuk hianyoznak - ne hasznald!).
#
# Meret-sorrend:
#   xs (9-11)  - alcimek, jegyzetek
#   sm (11-13) - kis feliratok, mb/km/h egysegek
#   md (16)    - alapertelmezett szovegek
#   lg (20-24) - kiemelt szovegek, ertekek
#   xl (44)    - brand cimkek (boot screen)
#   huge (72)  - nagy szamok (clock, AQI)
#   mega (110) - ora a kezdo oldalon
# =============================================================================
font:
  # --- Roboto (proporcionalis - feliratok, gombok) ---
  - file: "gfonts://Roboto"
    id: font_xs
    size: 11
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto"
    id: font_sm
    size: 13
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto"
    id: font_md
    size: 16
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto"
    id: font_lg
    size: 20
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'

  # --- Roboto Mono (monospace - szamok, idok, ertekek) ---
  - file: "gfonts://Roboto Mono"
    id: font_mono_xs
    size: 9
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_sm
    size: 11
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_md
    size: 16
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_lg
    size: 24
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_xl
    size: 44
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_huge
    size: 72
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  - file: "gfonts://Roboto Mono"
    id: font_mono_mega
    size: 110
    glyphs: ' !"#$%&()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]_`abcdefghijklmnopqrstuvwxyz{|}~°'
  # --- Roboto light (300 weight) - csak a Forecast nagy homerseklethez ---
  # Seattle weather app stilus, vekony es elegans 130px. Korlatozott glyph
  # set (csak szamok, °, +/-) - kisebb flash hely.
  - file:
      type: gfonts
      family: Roboto
      weight: 300
    id: font_temp_huge
    size: 130
    glyphs: '0123456789-°+'

  # ===== Material Design Icons (egyetlen file, 5 meretben) =====
  # A &mdi_glyphs YAML anchor egyszer definialja a glyphs listat, a tobbi
  # meret (md, lg, xl, huge) ezt hivatkozza *mdi_glyphs syntaxsszal -
