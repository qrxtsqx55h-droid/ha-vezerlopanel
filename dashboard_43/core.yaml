# =============================================================================
# LVGL CONFIG
# =============================================================================
# A buffer_size: 100% = full screen double buffer (PSRAM-ban).
# A style_definitions blokk a kartyak/gombok kozos stilusait gyujti egybe -
# minden oldal hivatkozza ezeket (styles: style_xxx).
# =============================================================================
lvgl:
  displays: [my_display]
  touchscreens: [my_touch]
  buffer_size: 100%   # Full screen buffer - sima animaciok, de PSRAM-igenyes
  bg_color: $color_bg
  text_color: $color_text_main
  border_width: 0

  # ---------------------------------------------------------------------------
  # KOZOS STILUSOK (kartyak, panel-ek, gombok)
  # ---------------------------------------------------------------------------
  style_definitions:
    # Alapertelmezett kartya: sotetkek gradient + finom border
    - id: style_card
      bg_color: 0x10131F
      bg_grad_color: 0x161A28
      bg_grad_dir: VER
      bg_opa: COVER
      border_width: 1
      border_color: 0x242A40
      radius: 14
      pad_all: 0

    # Radar oldal kartya: zold accent border
    - id: style_radar_card
      bg_color: 0x0A0C14
      bg_grad_color: 0x10131F
      bg_grad_dir: VER
      bg_opa: COVER
      border_width: 1
      border_color: $color_accent_green
      radius: 14
      pad_all: 0
    # Radar villanopont: zold glow effekttel (animalt)
    - id: style_radar_dot
      bg_color: $color_accent_green
      bg_opa: COVER
      radius: 6
      shadow_color: $color_accent_green
      shadow_width: 25
      shadow_spread: 4
      shadow_opa: COVER

    # Radar aktivitas histogramm sav (12 db bar a radar oldalon)
    - id: style_radar_bar
      bg_color: 0x1A1D2E
      bg_opa: COVER
      border_width: 0
      radius: 2

    # Levego oldal kartyaja: sotetzold gradient + zold border
    - id: style_air_card
      bg_color: 0x0C2218
      bg_grad_color: 0x030508
      bg_grad_dir: VER
      bg_opa: COVER
      border_width: 1
      border_color: $color_accent_green
      radius: 14
      pad_all: 0

    # Lampak oldal kartyaja: alapertelmezett, atlatszobb (78% opa)
    - id: style_light_card
      bg_color: 0x10131F
      bg_grad_color: 0x161A28
      bg_grad_dir: VER
      bg_opa: 78%
      border_width: 1
      border_color: 0x242A40
      radius: 14
      pad_all: 0

    # ===== Solar oldal "holo" stilusok (Iron Man-szeru cyan panel + gombok) =====
    # Holo panel: napenergia kartyak (PV, AKKU, HALOZAT stb.)
    - id: style_holo_panel
      bg_color: 0x000814
      bg_grad_color: 0x001830
      bg_grad_dir: VER
      bg_opa: 75%
      border_width: 1
      border_color: 0x41BDF5
      radius: 6
      pad_all: 0

    # EV INDIT gomb (zold)
    - id: style_holo_button
      bg_color: 0x001830
      bg_grad_color: 0x000814
      bg_grad_dir: VER
      bg_opa: 85%
      border_width: 1
      border_color: $color_accent_green
      radius: 6
      pad_all: 0

    # EV STOP gomb (piros)
    - id: style_holo_button_red
      bg_color: 0x300814
      bg_grad_color: 0x14000A
      bg_grad_dir: VER
      bg_opa: 85%
      border_width: 1
      border_color: $color_danger
      radius: 6
      pad_all: 0

  pages:
    # =========================================================================
    # PAGE_BOOT - Sajat brand-elt indito kepernyo "powered by Mikzone Boti"
    # =========================================================================
    # Boot-kor (on_boot) ez a kepernyo jelenik meg ~3.5 mp-ig, amig:
    #   - WiFi csatlakozik
    #   - HA API kapcsolat felall
    #   - Idojaras + szenzor adatok beerkeznek
    # Mindezt elrejti egy stilusos cyan/amber indito animacioval.
    # A boot_sequence script lepteti a `ui_boot_bar`-t es forgatja a
    # `ui_boot_arc`-ot.
    # =========================================================================
    - id: page_boot
      bg_color: 0x000000
      widgets:
        # --- Halvanyan pulzalo kulso gyuru (300x280) ---
        - arc:
            align: CENTER
            y: -30
            width: 280
            height: 280
            start_angle: 0
            end_angle: 360
            rotation: 270
            min_value: 0
            max_value: 100
            value: 100
            arc_color: 0x060810
            arc_width: 1
            indicator: { arc_color: 0x1A2540, arc_width: 1 }

        # --- Belso accent cyan gyuru (forgatott 90° szakasz - animalt) ---
        - arc:
            id: ui_boot_arc
            align: CENTER
            y: -30
            width: 220
            height: 220
            start_angle: 0
            end_angle: 90
            rotation: 0
            min_value: 0
            max_value: 100
            value: 100
            arc_color: 0x060810
            arc_width: 3
            indicator: { arc_color: 0x00E5FF, arc_width: 3 }

        # --- Dekorativ vizszintes vonalak a brand alatt es felett ---
        - obj: { align: CENTER, y: -115, width: 400, height: 1, bg_color: 0x0E1220, bg_opa: COVER, border_width: 0 }
        - obj: { align: CENTER, y: 60, width: 400, height: 1, bg_color: 0x0E1220, bg_opa: COVER, border_width: 0 }

        # --- "powered by" felso felirat (halvany subtitle) ---
        - label: { align: CENTER, y: -90, text: "powered by", text_font: font_sm, text_color: 0x2A3050, text_letter_space: 6 }

        # --- MIKZONE - cyan brand cimke (Roboto Mono XL 44px) ---
        - label: { align: CENTER, y: -45, text: "MIKZONE", text_font: font_mono_xl, text_color: 0x00E5FF, text_letter_space: 12 }

        # --- BOTI - amber cimke (alatta, kisebb) ---
        - label: { align: CENTER, y: 15, text: "BOTI", text_font: font_mono_lg, text_color: 0xFFB800, text_letter_space: 16 }

        # --- Elvalaszto pont sor ---
        - label: { align: CENTER, y: 78, text: "- - - - - - - - -", text_font: font_xs, text_color: 0x1A2540 }

        # --- Tagline (szlogen) ---
        - label: { align: CENTER, y: 100, text: "SMART HOME CONTROL PANEL", text_font: font_xs, text_color: 0x1E2840, text_letter_space: 5 }

        # --- Loading bar (boot_sequence frissiti 0-100%) ---
        - bar:
            id: ui_boot_bar
            align: CENTER
            y: 160
            width: 300
            height: 3
            bg_color: 0x0A0E18
            indicator: { bg_color: 0x00E5FF }
            min_value: 0
            max_value: 100
            value: 0

        # --- Rendszer info (halvany - "ezzel mukodik a panel") ---
        - label: { align: CENTER, y: 200, text: "ESP32-S3  |  LVGL  |  800x480", text_font: font_xs, text_color: 0x141828, text_letter_space: 2 }

  # ===========================================================================
  # TOP LAYER - kepernyo felett megjeleno OVERLAY elemek
  # ---------------------------------------------------------------------------
  # 1) Notification bar (ui_notify_bar) - 50px magas, felul
  # 2) Main tab bar (main_tab_bar) - 48px magas, alul (6 fol oldal navigacio)
  #
  # A top_layer az osszes page felett van, igy ezek mindenhonnan latszanak.
  # ===========================================================================
  top_layer:
    widgets:
      # =====================================================================
      # NOTIFICATION BAR - felso 50px ertesitosav (a show_notification mutatja)
      # =====================================================================
      # Tartalom: ikon balra + szoveg + X bezaras + alulhuzas
      # Click - hide_notification (kiveve ha sticky)
      - obj:
          id: ui_notify_bar
          x: 0
          y: 0
          width: 800
          height: 50
          bg_color: 0x0A0C14
          bg_opa: 95%
          border_width: 0
          radius: 0
          pad_all: 0
          hidden: true   # Alapertelmezetten rejtett (show_notification jeleniti meg)
          on_click:
            - if:
                condition: { lambda: 'return !id(notify_sticky);' }
                then:
                  - script.execute: hide_notification
          widgets:
            - label: { id: ui_notify_icon, x: 20, align: LEFT_MID, text: "\U000F0026", text_font: icons_md, text_color: $color_accent_amber }
            - label: { id: ui_notify_text, x: 64, align: LEFT_MID, text: "", text_font: font_md, text_color: 0xFFFFFF, text_letter_space: 2 }
            - label: { x: -20, align: RIGHT_MID, text: "\U000F0156", text_font: icons_sm, text_color: $color_subtle }
            # Alulhuzas (accent szin a notification fontossagatol fuggoen)
            - obj:
                id: ui_notify_underline
                x: 0
                y: 48
                width: 800
                height: 2
                bg_color: $color_accent_amber
                bg_opa: COVER
                border_width: 0
                radius: 0

      # =====================================================================
      # MAIN TAB BAR - also 48px navigacios sav (6 ikon az oldalak kozott)
      # =====================================================================
      # 800px / 6 oldal = 133px gomb (utolso 134-re kerekitett ha kell).
      # Aktiv tab: szines border felul + szines ikon/szoveg.
      # Egy `set_tab_active(tab_index)` script kezeli a valtast.
      - obj:
          id: main_tab_bar
          x: 0
          y: 432
          width: 800
          height: 48
          bg_color: 0x0D0F1C
          bg_opa: COVER
          border_width: 1
          border_side: [TOP]
          border_color: 0x1E2235
          radius: 0
          pad_all: 0
          widgets:
            - button:
                id: btn_tab_home
                x: 0
                y: 0
                width: 133
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 2
                border_side: [TOP]
                border_color: $color_accent_blue
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 0 }
                widgets:
                  - label: { id: tab_icon_home, align: TOP_MID, y: 5, text: "\U000F02DC", text_font: icons_sm, text_color: $color_accent_blue }
                  - label: { id: tab_text_home, align: BOTTOM_MID, y: -5, text: "KEZDOLAP", text_font: font_xs, text_color: $color_accent_blue }
            - button:
                id: btn_tab_air
                x: 133
                y: 0
                width: 133
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 0
                border_side: [TOP]
                border_color: $color_accent_green
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 1 }
                widgets:
                  - label: { id: tab_icon_air, align: TOP_MID, y: 5, text: "\U000F0D72", text_font: icons_sm, text_color: $color_inactive }
                  - label: { id: tab_text_air, align: BOTTOM_MID, y: -5, text: "LEVEGO", text_font: font_xs, text_color: $color_inactive }
            - button:
                id: btn_tab_solar
                x: 266
                y: 0
                width: 133
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 0
                border_side: [TOP]
                border_color: $color_accent_amber
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 2 }
                widgets:
                  - label: { id: tab_icon_solar, align: TOP_MID, y: 5, text: "\U000F0599", text_font: icons_sm, text_color: $color_inactive }
                  - label: { id: tab_text_solar, align: BOTTOM_MID, y: -5, text: "NAPENERGIA", text_font: font_xs, text_color: $color_inactive }
            - button:
                id: btn_tab_radar
                x: 399
                y: 0
                width: 133
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 0
                border_side: [TOP]
                border_color: $color_accent_purple
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 3 }
                widgets:
                  - label: { id: tab_icon_radar, align: TOP_MID, y: 5, text: "\U000F0437", text_font: icons_sm, text_color: $color_inactive }
                  - label: { id: tab_text_radar, align: BOTTOM_MID, y: -5, text: "JELENLET", text_font: font_xs, text_color: $color_inactive }
            - button:
                id: btn_tab_lights
                x: 532
                y: 0
                width: 133
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 0
                border_side: [TOP]
                border_color: $color_accent_orange
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 4 }
                widgets:
                  - label: { id: tab_icon_lights, align: TOP_MID, y: 5, text: "\U000F0335", text_font: icons_sm, text_color: $color_inactive }
                  - label: { id: tab_text_lights, align: BOTTOM_MID, y: -5, text: "FENYEK", text_font: font_xs, text_color: $color_inactive }
            - button:
                id: btn_tab_heating
                x: 665
                y: 0
                width: 135
                height: 48
                bg_color: 0x0D0F1C
                bg_opa: COVER
                border_width: 0
                border_side: [TOP]
                border_color: $color_accent_heat
                radius: 0
                pad_all: 0
                on_click:
                  - script.execute: { id: set_tab_active, tab_index: 5 }
                widgets:
                  - label: { id: tab_icon_heating, align: TOP_MID, y: 5, text: "\U000F050F", text_font: icons_sm, text_color: $color_inactive }
                  - label: { id: tab_text_heating, align: BOTTOM_MID, y: -5, text: "FUTES", text_font: font_xs, text_color: $color_inactive }