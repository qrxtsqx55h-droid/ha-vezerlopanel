# =============================================================================
# dashboard_43/forecast.yaml - Seattle-stilusu redesign
# Felul: helyiseg + datum, kozepen nagy ikon + allapot, jobbra reszletek
# Bal kozepen: nagy temp + "Erzet: ..."
# Alul: 5 napos sor (PNG ikonok 50x50, max hom)
# =============================================================================
# =============================================================================
# dashboard_43/forecast.yaml
# -----------------------------------------------------------------------------
# 5 NAPOS IDOJARAS ELOREJELZES OVERLAY (page_forecast)
# -----------------------------------------------------------------------------
# Ez egy "overlay" oldal, amit a HOME oldal idojaras kartyajara kattintassal
# lehet megnyitni. Glass Morphism stilus, cyan accent border-rel.
#
# Tartalom:
#   - Bal felso: varos (Miercurea-Ciuc), datum, nap
#   - Kozep felul: nagy idojaras ikon + halo glow + "Esos" allapot + Erzet
#   - Bal kozep: nagy aktualis homerseklet (font_temp_huge 130px)
#   - Jobb panel: 5 reszlet (Napkelte, Naplemente, Paratart, Szel, Nyomas)
#   - Also sav: 5 napos kartyak (MA, HOLNAP, KED, SZE, CSU) - HELYI napnev
#               + ikon + max hom + min hom
#   - Bezaro X gomb (jobb felso) ES kattintas a hatterre
#
# Adatforras:
#   - Aktualis: weather.pirateweather (home-2.yaml frissiti az ui_fc_* mezoket)
#   - 5 napos: sensor.forecast_d1..d5_condition + tempmax + tempmin
#   - Napnevek: ESPHome ha_time-bol HELYILEG szamolva (lasd: core.yaml refresh_clock)
# =============================================================================

# -----------------------------------------------------------------------------
# GLOBALIS VALTOZOK
# -----------------------------------------------------------------------------
globals:
  # TRUE = a forecast overlay nyitva (evaluate_night_mode NE valtson oldalt)
  - id: is_forecast_open
    type: bool
    restore_value: false
    initial_value: "false"
  # Atmenetileg tarolt condition->ikon tipus (1-9), hogy az update_fc_row_icon
  # script ne ismetelje a string osszehasonlitast minden napra (5x10 = 50
  # if-blokk helyett 1x9 + 5x9 int osszehasonlitas).
  - id: fc_icon_type
    type: int
    restore_value: false
    initial_value: "0"

# -----------------------------------------------------------------------------
# SCRIPT - UPDATE_FC_ROW_ICON
# -----------------------------------------------------------------------------
# Az 5 napos sor egy adott napjanak ikonjat allitja az idojaras
# allapot (string) alapjan.
# Parameterek:
#   idx:       1-5 (melyik nap kartyaja)
#   condition: HA weather state string ("sunny", "cloudy", "rainy", stb.)
# Mukodes:
#   1. Lambda: condition -> fc_icon_type (int 1-9, 0=ismeretlen)
#   2. Outer if (idx): csak az adott naphoz tartozo lvgl.image.update fut
#   3. Inner if (fc_icon_type): csak az adott tipushoz tartozo image frissit
# Ez 5 napra ismetlodik (idx 1-5).
script:
  - id: update_fc_row_icon
    parameters:
      idx: int
      condition: string
    then:
      - lambda: |-
          int t = 0;
          if (condition == "sunny") t = 1;
          else if (condition == "clear-night") t = 2;
          else if (condition == "cloudy" || condition == "fog") t = 3;
          else if (condition == "partlycloudy") t = 4;
          else if (condition == "rainy") t = 5;
          else if (condition == "pouring") t = 6;
          else if (condition == "snowy" || condition == "snowy-rainy" || condition == "hail") t = 7;
          else if (condition == "windy" || condition == "windy-variant") t = 8;
          else if (condition == "lightning" || condition == "lightning-rainy") t = 9;
          else t = 3;
          id(fc_icon_type) = t;
      - if:
          condition: { lambda: 'return idx == 1;' }
          then:
            - if: { condition: { lambda: 'return id(fc_icon_type) == 1;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_sunny }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 2;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_night }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 3;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_cloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 4;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_partlycloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 5;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_rainy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 6;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_pouring }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 7;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_snowy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 8;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_windy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 9;' }, then: [lvgl.image.update: { id: fc_img_d1, src: img_sm_thunderstorm }] }
      - if:
          condition: { lambda: 'return idx == 2;' }
          then:
            - if: { condition: { lambda: 'return id(fc_icon_type) == 1;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_sunny }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 2;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_night }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 3;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_cloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 4;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_partlycloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 5;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_rainy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 6;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_pouring }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 7;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_snowy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 8;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_windy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 9;' }, then: [lvgl.image.update: { id: fc_img_d2, src: img_sm_thunderstorm }] }
      - if:
          condition: { lambda: 'return idx == 3;' }
          then:
            - if: { condition: { lambda: 'return id(fc_icon_type) == 1;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_sunny }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 2;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_night }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 3;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_cloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 4;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_partlycloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 5;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_rainy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 6;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_pouring }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 7;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_snowy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 8;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_windy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 9;' }, then: [lvgl.image.update: { id: fc_img_d3, src: img_sm_thunderstorm }] }
      - if:
          condition: { lambda: 'return idx == 4;' }
          then:
            - if: { condition: { lambda: 'return id(fc_icon_type) == 1;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_sunny }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 2;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_night }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 3;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_cloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 4;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_partlycloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 5;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_rainy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 6;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_pouring }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 7;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_snowy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 8;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_windy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 9;' }, then: [lvgl.image.update: { id: fc_img_d4, src: img_sm_thunderstorm }] }
      - if:
          condition: { lambda: 'return idx == 5;' }
          then:
            - if: { condition: { lambda: 'return id(fc_icon_type) == 1;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_sunny }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 2;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_night }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 3;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_cloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 4;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_partlycloudy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 5;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_rainy }] }
            - if: { condition: { lambda: 'return id(fc_icon_type) == 6;' }, then: [lvgl.image.update: { id: fc_img_d5, src: img_sm_pouring }] }
