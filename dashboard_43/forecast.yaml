# -----------------------------------------------------------------------------
# SZENZOROK - 5 nap max+min homerseklet + apparent_temperature
# -----------------------------------------------------------------------------
# A `%+.0f°` formattal a max hom mindig +/- jellel jelenik meg.
# A min hom plusz jel nelkul (kisebb font, halvanyabb szin).
# Az apparent_temperature a "Erzet: X°" feliratban jelenik meg.
sensor:
  # --- Max homersekletek (5 nap) ---
  - platform: homeassistant
    id: fc_d1_temp_max
    entity_id: "${entity_fc_d1_temp_max}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_d1, text: !lambda 'return str_sprintf("%+.0f°", x);' }
  - platform: homeassistant
    id: fc_d2_temp_max
    entity_id: "${entity_fc_d2_temp_max}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_d2, text: !lambda 'return str_sprintf("%+.0f°", x);' }
  - platform: homeassistant
    id: fc_d3_temp_max
    entity_id: "${entity_fc_d3_temp_max}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_d3, text: !lambda 'return str_sprintf("%+.0f°", x);' }
  - platform: homeassistant
    id: fc_d4_temp_max
    entity_id: "${entity_fc_d4_temp_max}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_d4, text: !lambda 'return str_sprintf("%+.0f°", x);' }
  - platform: homeassistant
    id: fc_d5_temp_max
    entity_id: "${entity_fc_d5_temp_max}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_d5, text: !lambda 'return str_sprintf("%+.0f°", x);' }

  # --- Min homersekletek (5 nap) ---
  - platform: homeassistant
    id: fc_d1_temp_min
    entity_id: "${entity_fc_d1_temp_min}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_min_d1, text: !lambda 'return str_sprintf("%.0f°", x);' }
  - platform: homeassistant
    id: fc_d2_temp_min
    entity_id: "${entity_fc_d2_temp_min}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_min_d2, text: !lambda 'return str_sprintf("%.0f°", x);' }
  - platform: homeassistant
    id: fc_d3_temp_min
    entity_id: "${entity_fc_d3_temp_min}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_min_d3, text: !lambda 'return str_sprintf("%.0f°", x);' }
  - platform: homeassistant
    id: fc_d4_temp_min
    entity_id: "${entity_fc_d4_temp_min}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_min_d4, text: !lambda 'return str_sprintf("%.0f°", x);' }
  - platform: homeassistant
    id: fc_d5_temp_min
    entity_id: "${entity_fc_d5_temp_min}"
    on_value:
      then:
        - lvgl.label.update: { id: fc_temp_min_d5, text: !lambda 'return str_sprintf("%.0f°", x);' }

  - platform: homeassistant
    id: fc_apparent_temp
    entity_id: "${entity_weather}"
    attribute: apparent_temperature
    on_value:
      then:
        - lvgl.label.update: { id: ui_fc_feels_like, text: !lambda 'return isnan(x) ? "Erzet: --°" : str_sprintf("Erzet: %.0f°", x);' }

# -----------------------------------------------------------------------------
# TEXT SZENZOROK - idojaras allapot stringek (sunny, cloudy, rainy...)
# -----------------------------------------------------------------------------
# Minden allapot frissites az update_fc_row_icon scriptet hivja az adott
# nap (idx) es az uj condition (string) parameterevel.
#
# MEGJEGYZES: a napnevek (fc_d*_day) NEM HA-bol jonnek, hanem helyileg
# vannak szamolva a refresh_clock lambda blokkjaban (core.yaml).
text_sensor:
  - platform: homeassistant
    id: fc_d1_condition
    entity_id: "${entity_fc_d1_condition}"
    on_value:
      then: [ script.execute: { id: update_fc_row_icon, idx: 1, condition: !lambda 'return x;' } ]
  - platform: homeassistant
    id: fc_d2_condition
    entity_id: "${entity_fc_d2_condition}"
    on_value:
      then: [ script.execute: { id: update_fc_row_icon, idx: 2, condition: !lambda 'return x;' } ]
  - platform: homeassistant
    id: fc_d3_condition
    entity_id: "${entity_fc_d3_condition}"
    on_value:
      then: [ script.execute: { id: update_fc_row_icon, idx: 3, condition: !lambda 'return x;' } ]
  - platform: homeassistant
    id: fc_d4_condition
    entity_id: "${entity_fc_d4_condition}"
    on_value:
      then: [ script.execute: { id: update_fc_row_icon, idx: 4, condition: !lambda 'return x;' } ]
  - platform: homeassistant
    id: fc_d5_condition
    entity_id: "${entity_fc_d5_condition}"
    on_value:
      then: [ script.execute: { id: update_fc_row_icon, idx: 5, condition: !lambda 'return x;' } ]

# =============================================================================
# UI - PAGE_FORECAST (5 napos elorejelzes overlay, GLASS MORPHISM stilus)
# =============================================================================
# Megnyitas: a home oldal idojaras kartyajara kattintassal
# Bezaras:   X gomb VAGY a teljes hatter kattintasa
#
# A jobb panel x: 460 + width: 275 = 735 -> elfer az X bezaro gomb mellett
# (x: 748, width: 40 -> 788 az X jobb szele a 800-as kepernyon).
lvgl:
  pages:
    - id: page_forecast
      bg_color: 0x040812
      widgets:
        # --- Teljes hatter bezaro gomb ---
        - button:
            x: 0
            y: 0
            width: 800
            height: 480
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - lambda: 'id(is_forecast_open) = false;'
              # Ha az ejszakai mod aktiv, automatikusan tertunk vissza oda - kulonben home-ra
              - script.execute: evaluate_night_mode
              - if:
                  condition: { lambda: 'return !id(is_night_active);' }
                  then:
                    - lvgl.widget.update: { id: main_tab_bar, hidden: false }
                    - script.execute: { id: set_tab_active, tab_index: 0 }

        # ====================================================================
        # HATTERI GRADIENS GLOW (radialis hatas felulrol)
        # ====================================================================
        - obj: { x: 0, y: 0, width: 800, height: 200, bg_color: 0x0A1830, bg_grad_color: 0x040812, bg_grad_dir: VER, bg_opa: COVER, border_width: 0, radius: 0 }
        - obj: { x: 0, y: 0, width: 800, height: 1, bg_color: $color_accent_blue, bg_opa: 30%, border_width: 0, radius: 0 }

        # ====================================================================
        # BEZARO GOMB (jobb felso sarok) - uveg hatas
        # ====================================================================
        - button:
            id: btn_forecast_close
            x: 748
            y: 10
            width: 40
            height: 40
            bg_color: 0x1A0816
            bg_opa: 60%
            border_width: 1
            border_color: $color_danger
            radius: 20
            on_click:
              - lambda: 'id(is_forecast_open) = false;'
              # Ha az ejszakai mod aktiv, automatikusan tertunk vissza oda - kulonben home-ra
              - script.execute: evaluate_night_mode
              - if:
                  condition: { lambda: 'return !id(is_night_active);' }
                  then:
                    - lvgl.widget.update: { id: main_tab_bar, hidden: false }
                    - script.execute: { id: set_tab_active, tab_index: 0 }
            widgets:
              - label: { align: CENTER, text: "\U000F0156", text_font: icons_sm, text_color: $color_danger }

        # ====================================================================
        # BAL FELSO - varos, datum (vekony elegans tipografia)
        # ====================================================================
        - label: { x: 28, y: 16, text: "\U000F034E", text_font: icons_md, text_color: $color_accent_blue }
        - label: { x: 62, y: 20, text: "Miercurea-Ciuc", text_font: font_lg, text_color: 0xFFFFFF, text_letter_space: 2 }
        - label: { id: ui_fc_date_label, x: 28, y: 56, text: "majus 29.", text_font: font_md, text_color: 0xAACCEE, text_letter_space: 3 }
        - label: { id: ui_fc_day_label, x: 28, y: 80, text: "Pentek", text_font: font_lg, text_color: $color_accent_blue, text_letter_space: 5 }

        # ====================================================================
        # IDOJARAS IKON (kozep-jobb, a varos felirat ALATT) + ALLAPOT/ERZET ALATTA
        # ====================================================================
        # Halo glow effekt az ikon mogott (lejjebb tolva, hogy ne takarja a varos nevet)
        - obj: { x: 292, y: 44, width: 130, height: 130, bg_color: 0x41BDF5, bg_opa: 8%, border_width: 0, radius: 65 }
        - obj: { x: 307, y: 59, width: 100, height: 100, bg_color: 0x41BDF5, bg_opa: 12%, border_width: 0, radius: 50 }
        - image: { id: ui_fc_current_icon, src: img_partlycloudy, x: 300, y: 52 }

        # --- Felhos + Erzet az ikon ALATT, kozepre igazitva ---
        - label: { id: ui_fc_current_state, x: 292, y: 172, width: 130, text: "Reszben felhos", text_font: font_lg, text_color: 0xFFFFFF, text_align: CENTER }
        - label: { id: ui_fc_feels_like, x: 292, y: 200, width: 130, text: "Erzet: --°", text_font: font_md, text_color: 0x8AB0D0, text_align: CENTER }

        # ====================================================================
        # NAGY HOMERSEKLET (feljebb tolva, bal kozepe-also)
        # ====================================================================
        # Halo a homer mogott
        - obj: { x: 25, y: 155, width: 80, height: 80, bg_color: 0xFF6B35, bg_opa: 10%, border_width: 0, radius: 40 }
        - label: { x: 30, y: 160, text: "\U000F050F", text_font: icons_xl, text_color: $color_danger }
        - label: { id: ui_fc_current_temp, x: 90, y: 145, text: "--°", text_font: font_temp_huge, text_color: 0xFFFFFF }

        # ====================================================================
        # JOBB PANEL - GLASS MORPHISM (uveg hatas)
        # ====================================================================
        # Outer glow / soft border halo
        - obj:
            x: 458
            y: 14
            width: 280
            height: 304
            bg_color: 0x00E5FF
            bg_opa: 8%
            border_width: 0
            radius: 22
        # Main glass panel (border = cyan glow, NINCS kilogo felso vonal)
        - obj:
            x: 460
            y: 16
            width: 275
            height: 300
            bg_color: 0x0A1428
            bg_grad_color: 0x081020
            bg_grad_dir: VER
            bg_opa: 55%
            border_width: 1
            border_color: 0x3A6090
            radius: 20
            pad_all: 0
            widgets:
              # --- Cim ---
              - label: { x: 18, y: 14, text: "RESZLETEK", text_font: font_xs, text_color: 0xCCEEFF, text_letter_space: 6 }

              # --- Sor 1: Napkelte ---
              - label: { x: 18, y: 40, text: "\U000F05B3", text_font: icons_md, text_color: $color_accent_amber }
              - label: { x: 52, y: 40, text: "Napkelte", text_font: font_md, text_color: 0xAABBCC, text_letter_space: 1 }
              - label: { id: ui_fc_sunrise, x: 175, y: 40, text: "--:--", text_font: font_mono_lg, text_color: $color_accent_amber }
              - obj: { x: 18, y: 70, width: 239, height: 1, bg_color: 0x00E5FF, bg_opa: 12%, border_width: 0 }

              # --- Sor 2: Naplemente ---
